<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Репетитор Хаб</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 15px; }
        .button { display: block; width: 100%; padding: 10px; margin: 10px 0; background: #3390ec; color: white; border: none; border-radius: 8px; cursor: pointer; text-align: center; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <h2 id="role-title">Вхід в систему</h2>
        
        <div id="teacher-menu" class="hidden">
            <button class="button" onclick="action('add_student')">➕ Додати учня</button>
            <button class="button" onclick="action('schedule')">📅 Мій розклад</button>
            <button class="button" onclick="action('mark_lesson')">✅ Відмітити заняття</button>
            <button class="button" onclick="action('my_students')">👥 Мої учні</button>
        </div>

        <div id="student-menu" class="hidden">
            <button class="button" onclick="action('student_schedule')">📅 Мій розклад</button>
        </div>

        <div id="parent-menu" class="hidden">
            <button class="button" onclick="action('child_schedule')">📅 Розклад дитини</button>
            <button class="button" onclick="action('child_balance')">💰 Баланс дитини</button>
            <button class="button" onclick="action('top_up')">💳 Поповнити баланс</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функція для відправки даних назад у бот
        function action(type) {
            tg.sendData(JSON.stringify({action: type}));
            tg.close();
        }

        // Логіка відображення (в реальному додатку роль прийде з сервера)
        // Для тесту можна вручну перемикати:
        const userRole = 'teacher'; // Можливі: teacher, student, parent

        if (userRole === 'teacher') document.getElementById('teacher-menu').classList.remove('hidden');
        if (userRole === 'student') document.getElementById('student-menu').classList.remove('hidden');
        if (userRole === 'parent') document.getElementById('parent-menu').classList.remove('hidden');
    </script>
</body>
</html>
